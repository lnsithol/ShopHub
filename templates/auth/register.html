{% extends "base.html" %}

{% block title %}
Register | ShopHub
{% endblock %}

{% block content %}

<section class="auth-page">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-7 col-lg-6">

                <div class="card auth-card shadow-lg border-0">

                    <div class="card-body p-5">

                        <div class="text-center mb-4">

                            <h1 class="fw-bold">
                                Create Account
                            </h1>

                            <p class="text-muted">
                                Join ShopHub today
                            </p>

                        </div>

                        <form method="POST">

                            <div class="mb-3">

                                <label class="form-label">
                                    Username
                                </label>

                                <input
                                    type="text"
                                    name="username"
                                    class="form-control"
                                    placeholder="Choose a username"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Email Address
                                </label>

                                <input
                                    type="email"
                                    name="email"
                                    class="form-control"
                                    placeholder="Enter your email"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Password
                                </label>

                                <input
                                    type="password"
                                    name="password"
                                    class="form-control"
                                    placeholder="Create password"
                                    required>

                            </div>

                            <div class="mb-4">

                                <label class="form-label">
                                    Confirm Password
                                </label>

                                <input
                                    type="password"
                                    name="confirm_password"
                                    class="form-control"
                                    placeholder="Confirm password"
                                    required>

                            </div>

                            <button
                                type="submit"
                                class="btn btn-primary w-100">

                                Create Account

                            </button>

                        </form>

                        <div class="text-center mt-4">

                            <span class="text-muted">
                                Already have an account?
                            </span>

                            <a
                               href="{{ url_for('login') }}"
                               class="text-decoration-none fw-semibold">

                                Login

                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
