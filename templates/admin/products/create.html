{% extends "admin/base.html" %}

{% block title %}
Create Product
{% endblock %}

{% block page_title %}
Create Product
{% endblock %}

{% block content %}

<form method="POST" enctype="multipart/form-data">

    <div class="row g-4">

        <!-- LEFT -->

        <div class="col-lg-8">

            <!-- BASIC INFO -->

            <div class="card mb-4">

                <div class="card-header">

                    <h5 class="mb-0">

                        Product Information

                    </h5>

                </div>

                <div class="card-body">

                    <div class="mb-3">

                        <label class="form-label">

                            Product Name

                        </label>

                        <input type="text" name="name" class="form-control" required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Description

                        </label>

                        <textarea rows="6" name="description" class="form-control"></textarea>

                    </div>

                </div>

            </div>

            <!-- PRICING -->

            <div class="card mb-4">

                <div class="card-header">

                    <h5 class="mb-0">

                        Pricing

                    </h5>

                </div>

                <div class="card-body">

                    <div class="row">

                        <div class="col-md-6">

                            <label class="form-label">

                                Price

                            </label>

                            <input type="number" step="0.01" name="price" class="form-control" required>

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">

                                Sale Price

                            </label>

                            <input type="number" step="0.01" class="form-control">

                        </div>

                    </div>

                </div>

            </div>

            <!-- INVENTORY -->

            <div class="card">

                <div class="card-header">

                    <h5 class="mb-0">

                        Inventory

                    </h5>

                </div>

                <div class="card-body">

                    <div class="row">

                        <div class="col-md-6">

                            <label class="form-label">

                                SKU

                            </label>

                            <input type="text" name="sku" class="form-control">

                        </div>

                        <div class="col-md-6">

                            <label class="form-label">

                                Stock Quantity

                            </label>

                            <input type="number" name="stock_quantity" value="0" class="form-control">

                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- RIGHT -->

        <div class="col-lg-4">

            <!-- PUBLISH -->

            <div class="card mb-4">

                <div class="card-header">

                    <h5 class="mb-0">

                        Publishing

                    </h5>

                </div>

                <div class="card-body">

                    <div class="mb-3">

                        <label class="form-label">

                            Status

                        </label>

                        <select name="status" class="form-select">

                            <option value="active">

                                Active

                            </option>

                            <option value="inactive">

                                Inactive

                            </option>

                        </select>

                    </div>

                    <div class="form-check">

                        <input class="form-check-input" type="checkbox" name="featured">

                        <label class="form-check-label">

                            Featured Product

                        </label>

                    </div>

                </div>

            </div>

            <!-- CATEGORY -->

            <div class="card mb-4">

                <div class="card-header">

                    <h5 class="mb-0">

                        Category

                    </h5>

                </div>

                <div class="card-body">

                    <select name="category_id" class="form-select">

                        {% for category in categories %}

                        <option value="{{ category.id }}">

                            {{ category.name }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

            </div>

            <!-- IMAGE -->
            <div class="card mb-4">

                <div class="card-header">

                    Product Image

                </div>

                <div class="card-body">

                    <input type="file" name="image" accept="image/*" class="form-control">

                </div>

            </div>


            <!-- SEO -->

            <div class="card">

                <div class="card-header">

                    <h5 class="mb-0">

                        SEO

                    </h5>

                </div>

                <div class="card-body">

                    <div class="mb-3">

                        <label class="form-label">

                            Meta Title

                        </label>

                        <input type="text" class="form-control">

                    </div>

                    <div>

                        <label class="form-label">

                            Meta Description

                        </label>

                        <textarea rows="3" class="form-control"></textarea>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="mt-4">

        <button type="submit" class="btn btn-primary">

            <i class="bi bi-check-circle"></i>

            Save Product

        </button>

        <a href="/admin/products" class="btn btn-light">

            Cancel

        </a>

    </div>

</form>

{% endblock %}
