{% extends "admin/base.html" %}

{% block title %}
Edit Product
{% endblock %}

{% block page_title %}
Edit Product
{% endblock %}

{% block content %}

<form method="POST">

<div class="row g-4">

    <!-- LEFT -->

    <div class="col-lg-8">

        <div class="card mb-4">

            <div class="card-header">

                Product Information

            </div>

            <div class="card-body">

                <div class="mb-3">

                    <label class="form-label">

                        Product Name

                    </label>

                    <input
                        type="text"
                        name="name"
                        class="form-control"
                        value="{{ product.name }}"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Description

                    </label>

                    <textarea
                        class="form-control"
                        rows="6"
                        name="description">{{ product.description }}</textarea>

                </div>

            </div>

        </div>

        <div class="card mb-4">

            <div class="card-header">

                Pricing

            </div>

            <div class="card-body">

                <div class="row">

                    <div class="col-md-6">

                        <label class="form-label">

                            Price

                        </label>

                        <input
                            type="number"
                            step="0.01"
                            name="price"
                            class="form-control"
                            value="{{ product.price }}">

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">

                            Sale Price

                        </label>

                        <input
                            type="number"
                            step="0.01"
                            name="sale_price"
                            class="form-control"
                            value="{{ product.sale_price or '' }}">

                    </div>

                </div>

            </div>

        </div>

        <div class="card">

            <div class="card-header">

                Inventory

            </div>

            <div class="card-body">

                <div class="row">

                    <div class="col-md-6">

                        <label class="form-label">

                            SKU

                        </label>

                        <input
                            type="text"
                            name="sku"
                            class="form-control"
                            value="{{ product.sku }}">

                    </div>

                    <div class="col-md-6">

                        <label class="form-label">

                            Stock Quantity

                        </label>

                        <input
                            type="number"
                            name="stock_quantity"
                            class="form-control"
                            value="{{ product.stock_quantity }}">

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- RIGHT -->

    <div class="col-lg-4">

        <div class="card mb-4">

            <div class="card-header">

                Publishing

            </div>

            <div class="card-body">

                <div class="mb-3">

                    <label class="form-label">

                        Status

                    </label>

                    <select
                        name="status"
                        class="form-select">

                        <option
                            value="active"
                            {% if product.status == 'active' %}
                            selected
                            {% endif %}>

                            Active

                        </option>

                        <option
                            value="inactive"
                            {% if product.status == 'inactive' %}
                            selected
                            {% endif %}>

                            Inactive

                        </option>

                    </select>

                </div>

                <div class="form-check">

                    <input
                        type="checkbox"
                        class="form-check-input"
                        name="featured"
                        {% if product.featured %}
                        checked
                        {% endif %}>

                    <label class="form-check-label">

                        Featured Product

                    </label>

                </div>

            </div>

        </div>

        <div class="card mb-4">

            <div class="card-header">

                Category

            </div>

            <div class="card-body">

                <select
                    name="category_id"
                    class="form-select">

                    {% for category in categories %}

                    <option
                        value="{{ category.id }}"
                        {% if product.category_id == category.id %}
                        selected
                        {% endif %}>

                        {{ category.name }}

                    </option>

                    {% endfor %}

                </select>

            </div>

        </div>

        <div class="card">

            <div class="card-header">

                Product Image

            </div>

            <div class="card-body text-center">

                <img
                    src="{{ product.image if product.image else 'https://via.placeholder.com/250' }}"
                    class="img-fluid rounded mb-3">

                <button
                    type="button"
                    class="btn btn-outline-primary w-100">

                    Change Image

                </button>

            </div>

        </div>

    </div>

</div>

<div class="mt-4">

    <button
        type="submit"
        class="btn btn-primary">

        Update Product

    </button>

    <a
        href="{{ url_for('admin_products') }}"
        class="btn btn-secondary">

        Cancel

    </a>

</div>

</form>

{% endblock %}
