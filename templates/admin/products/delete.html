{% extends "admin/base.html" %}

{% block title %}
Delete Product
{% endblock %}

{% block page_title %}
Delete Product
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-6">

        <div class="card border-danger">

            <div class="card-header bg-danger text-white">

                Confirm Delete

            </div>

            <div class="card-body">

                <h5>

                    {{ product.name }}

                </h5>

                <p>

                    SKU:
                    {{ product.sku }}

                </p>

                <p class="text-danger">

                    This action cannot be undone.

                </p>

                <form method="POST">

                    <button
                        type="submit"
                        class="btn btn-danger">

                        Delete Product

                    </button>

                    <a
                        href="{{ url_for('admin_products') }}"
                        class="btn btn-secondary">

                        Cancel

                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
