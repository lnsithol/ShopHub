{% extends "admin/base.html" %}

{% block title %}
Create Category
{% endblock %}

{% block page_title %}
Create Category
{% endblock %}

{% block content %}

<form method="POST">

    <div class="card">

        <div class="card-body">

            <div class="mb-3">

                <label class="form-label">

                    Category Name

                </label>

                <input
                    type="text"
                    name="name"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Description

                </label>

                <textarea
                    name="description"
                    rows="4"
                    class="form-control"></textarea>

            </div>

            <button
                class="btn btn-primary">

                Save Category

            </button>

        </div>

    </div>

</form>

{% endblock %}
